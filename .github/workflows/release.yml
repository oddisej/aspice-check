name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.1). Used when triggered manually."
        required: true
        type: string
      packages:
        description: "Packages to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - confluence-ai
          - aspice-eval
          - aspice-check
      test_pypi:
        description: "Publish to TestPyPI instead of production PyPI"
        required: false
        default: false
        type: boolean

jobs:
  # ---------------------------------------------------------------------
  # Determine the version string from the tag or manual input
  # ---------------------------------------------------------------------
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      publish_confluence_ai: ${{ steps.targets.outputs.confluence_ai }}
      publish_aspice_eval: ${{ steps.targets.outputs.aspice_eval }}
      publish_aspice_check: ${{ steps.targets.outputs.aspice_check }}
    steps:
      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Strip leading 'v' from tag ref (e.g. refs/tags/v0.2.1 -> 0.2.1)
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Select packages to publish
        id: targets
        run: |
          SELECTION="${{ inputs.packages || 'all' }}"
          if [[ "$SELECTION" == "all" ]]; then
            echo "confluence_ai=true" >> "$GITHUB_OUTPUT"
            echo "aspice_eval=true" >> "$GITHUB_OUTPUT"
            echo "aspice_check=true" >> "$GITHUB_OUTPUT"
          else
            echo "confluence_ai=$([[ "$SELECTION" == "confluence-ai" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "aspice_eval=$([[ "$SELECTION" == "aspice-eval" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "aspice_check=$([[ "$SELECTION" == "aspice-check" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------
  # Run tests before publishing
  # ---------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install packages in editable mode
        run: |
          pip install --upgrade pip
          pip install -e "./confluence-ai[dev,all]"
          pip install -e "./aspice-eval[dev,all]"
          pip install -e "./aspice-check[dev,all]"

      - name: Run confluence-ai tests
        working-directory: confluence-ai
        run: pytest tests/ --hypothesis-profile=ci

      - name: Run aspice-eval tests
        working-directory: aspice-eval
        run: pytest tests/ --hypothesis-profile=ci

      - name: Run aspice-check tests
        working-directory: aspice-check
        run: pytest tests/

  # ---------------------------------------------------------------------
  # Build and publish each package (conditionally)
  # ---------------------------------------------------------------------
  publish-confluence-ai:
    name: Publish confluence-ai
    runs-on: ubuntu-latest
    needs: [prepare, test]
    if: needs.prepare.outputs.publish_confluence_ai == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install --upgrade pip build twine

      - name: Build confluence-ai
        run: python -m build confluence-ai/ --outdir confluence-ai/dist

      - name: Publish confluence-ai to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ inputs.test_pypi && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: python -m twine upload --non-interactive confluence-ai/dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: confluence-ai-dist
          path: confluence-ai/dist/*

  publish-aspice-eval:
    name: Publish aspice-eval
    runs-on: ubuntu-latest
    needs: [prepare, test, publish-confluence-ai]
    if: |
      always() &&
      needs.prepare.outputs.publish_aspice_eval == 'true' &&
      (needs.publish-confluence-ai.result == 'success' || needs.publish-confluence-ai.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install --upgrade pip build twine

      - name: Build aspice-eval
        run: python -m build aspice-eval/ --outdir aspice-eval/dist

      - name: Publish aspice-eval to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ inputs.test_pypi && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: python -m twine upload --non-interactive aspice-eval/dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aspice-eval-dist
          path: aspice-eval/dist/*

  publish-aspice-check:
    name: Publish aspice-check
    runs-on: ubuntu-latest
    needs: [prepare, test, publish-confluence-ai, publish-aspice-eval]
    if: |
      always() &&
      needs.prepare.outputs.publish_aspice_check == 'true' &&
      (needs.publish-confluence-ai.result == 'success' || needs.publish-confluence-ai.result == 'skipped') &&
      (needs.publish-aspice-eval.result == 'success' || needs.publish-aspice-eval.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install --upgrade pip build twine

      - name: Build aspice-check
        run: python -m build aspice-check/ --outdir aspice-check/dist

      - name: Publish aspice-check to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ inputs.test_pypi && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: python -m twine upload --non-interactive aspice-check/dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aspice-check-dist
          path: aspice-check/dist/*

  # ---------------------------------------------------------------------
  # Create a GitHub release with all build artifacts attached
  # (only runs on tag push, not manual dispatch)
  # ---------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-confluence-ai
      - publish-aspice-eval
      - publish-aspice-check
    if: |
      always() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !inputs.test_pypi
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            dist-artifacts/**/*.whl
            dist-artifacts/**/*.tar.gz
