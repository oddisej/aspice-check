name: Release

on:
  push:
    tags:
      # Unified: v0.2.1 — publishes any package whose current pyproject
      # version is not yet on PyPI
      - "v*.*.*"
      # Per-package: confluence-ai/v0.3.0, aspice-eval/v0.2.2, aspice-check/v0.2.2
      - "confluence-ai/v*.*.*"
      - "aspice-eval/v*.*.*"
      - "aspice-check/v*.*.*"
  workflow_dispatch:
    inputs:
      packages:
        description: "Packages to publish (skipped if version already exists on PyPI)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - confluence-ai
          - aspice-eval
          - aspice-check
      test_pypi:
        description: "Publish to TestPyPI instead of production PyPI"
        required: false
        default: false
        type: boolean

jobs:
  # ---------------------------------------------------------------------
  # Determine which packages to consider for publishing based on the
  # trigger (unified tag, per-package tag, or manual dispatch).
  # Actual "is this version already on PyPI?" check happens per-job.
  # ---------------------------------------------------------------------
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      publish_confluence_ai: ${{ steps.targets.outputs.confluence_ai }}
      publish_aspice_eval: ${{ steps.targets.outputs.aspice_eval }}
      publish_aspice_check: ${{ steps.targets.outputs.aspice_check }}
      is_tag_push: ${{ steps.targets.outputs.is_tag_push }}
    steps:
      - name: Select packages to consider
        id: targets
        run: |
          REF="${GITHUB_REF_NAME:-}"
          EVENT="${{ github.event_name }}"

          CA=false
          AE=false
          AC=false
          IS_TAG=false

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            SELECTION="${{ inputs.packages }}"
            if [[ "$SELECTION" == "all" ]]; then
              CA=true; AE=true; AC=true
            else
              [[ "$SELECTION" == "confluence-ai" ]] && CA=true
              [[ "$SELECTION" == "aspice-eval" ]]   && AE=true
              [[ "$SELECTION" == "aspice-check" ]]  && AC=true
            fi
          else
            IS_TAG=true
            # Tag triggered: decide which package(s) from the tag pattern
            case "$REF" in
              confluence-ai/v*)  CA=true ;;
              aspice-eval/v*)    AE=true ;;
              aspice-check/v*)   AC=true ;;
              v*)                CA=true; AE=true; AC=true ;;  # unified
              *)
                echo "Unknown tag pattern: $REF"
                exit 1
                ;;
            esac
          fi

          echo "confluence_ai=$CA" >> "$GITHUB_OUTPUT"
          echo "aspice_eval=$AE"   >> "$GITHUB_OUTPUT"
          echo "aspice_check=$AC"  >> "$GITHUB_OUTPUT"
          echo "is_tag_push=$IS_TAG" >> "$GITHUB_OUTPUT"

          echo "Ref: $REF"
          echo "Event: $EVENT"
          echo "confluence-ai: $CA, aspice-eval: $AE, aspice-check: $AC"

  # ---------------------------------------------------------------------
  # Run tests before publishing anything
  # ---------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install packages in editable mode
        run: |
          pip install --upgrade pip
          pip install -e "./confluence-ai[dev,all]"
          pip install -e "./aspice-eval[dev,all]"
          pip install -e "./aspice-check[dev,all]"

      - name: Run confluence-ai tests
        working-directory: confluence-ai
        run: pytest tests/ --hypothesis-profile=ci

      - name: Run aspice-eval tests
        working-directory: aspice-eval
        run: pytest tests/ --hypothesis-profile=ci

      - name: Run aspice-check tests
        working-directory: aspice-check
        run: pytest tests/

  # ---------------------------------------------------------------------
  # Publish confluence-ai (skipped if version already on PyPI)
  # ---------------------------------------------------------------------
  publish-confluence-ai:
    name: Publish confluence-ai
    runs-on: ubuntu-latest
    needs: [prepare, test]
    if: needs.prepare.outputs.publish_confluence_ai == 'true'
    outputs:
      published: ${{ steps.publish.outputs.published }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install --upgrade pip build twine

      - name: Read package version
        id: version
        run: |
          VERSION=$(python -c "
          import tomllib
          with open('confluence-ai/pyproject.toml','rb') as f: print(tomllib.load(f)['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "confluence-ai version: $VERSION"

      - name: Check if version already published on PyPI
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "${{ inputs.test_pypi }}" == "true" ]]; then
            URL="https://test.pypi.org/pypi/confluence-ai/$VERSION/json"
          else
            URL="https://pypi.org/pypi/confluence-ai/$VERSION/json"
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "confluence-ai $VERSION already on PyPI — skipping"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "confluence-ai $VERSION not on PyPI — will publish"
          fi

      - name: Build confluence-ai
        if: steps.check.outputs.already_published == 'false'
        run: python -m build confluence-ai/ --outdir confluence-ai/dist

      - name: Publish confluence-ai to PyPI
        id: publish
        if: steps.check.outputs.already_published == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ inputs.test_pypi && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: |
          python -m twine upload --non-interactive confluence-ai/dist/*
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        if: steps.check.outputs.already_published == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: confluence-ai-dist
          path: confluence-ai/dist/*

  # ---------------------------------------------------------------------
  # Publish aspice-eval (skipped if version already on PyPI)
  # ---------------------------------------------------------------------
  publish-aspice-eval:
    name: Publish aspice-eval
    runs-on: ubuntu-latest
    needs: [prepare, test, publish-confluence-ai]
    if: |
      always() &&
      needs.prepare.outputs.publish_aspice_eval == 'true' &&
      (needs.publish-confluence-ai.result == 'success' || needs.publish-confluence-ai.result == 'skipped')
    outputs:
      published: ${{ steps.publish.outputs.published }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install --upgrade pip build twine

      - name: Read package version
        id: version
        run: |
          VERSION=$(python -c "
          import tomllib
          with open('aspice-eval/pyproject.toml','rb') as f: print(tomllib.load(f)['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "aspice-eval version: $VERSION"

      - name: Check if version already published on PyPI
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "${{ inputs.test_pypi }}" == "true" ]]; then
            URL="https://test.pypi.org/pypi/aspice-eval/$VERSION/json"
          else
            URL="https://pypi.org/pypi/aspice-eval/$VERSION/json"
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "aspice-eval $VERSION already on PyPI — skipping"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "aspice-eval $VERSION not on PyPI — will publish"
          fi

      - name: Build aspice-eval
        if: steps.check.outputs.already_published == 'false'
        run: python -m build aspice-eval/ --outdir aspice-eval/dist

      - name: Publish aspice-eval to PyPI
        id: publish
        if: steps.check.outputs.already_published == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ inputs.test_pypi && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: |
          python -m twine upload --non-interactive aspice-eval/dist/*
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        if: steps.check.outputs.already_published == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: aspice-eval-dist
          path: aspice-eval/dist/*

  # ---------------------------------------------------------------------
  # Publish aspice-check (skipped if version already on PyPI)
  # ---------------------------------------------------------------------
  publish-aspice-check:
    name: Publish aspice-check
    runs-on: ubuntu-latest
    needs: [prepare, test, publish-confluence-ai, publish-aspice-eval]
    if: |
      always() &&
      needs.prepare.outputs.publish_aspice_check == 'true' &&
      (needs.publish-confluence-ai.result == 'success' || needs.publish-confluence-ai.result == 'skipped') &&
      (needs.publish-aspice-eval.result == 'success' || needs.publish-aspice-eval.result == 'skipped')
    outputs:
      published: ${{ steps.publish.outputs.published }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install --upgrade pip build twine

      - name: Read package version
        id: version
        run: |
          VERSION=$(python -c "
          import tomllib
          with open('aspice-check/pyproject.toml','rb') as f: print(tomllib.load(f)['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "aspice-check version: $VERSION"

      - name: Check if version already published on PyPI
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "${{ inputs.test_pypi }}" == "true" ]]; then
            URL="https://test.pypi.org/pypi/aspice-check/$VERSION/json"
          else
            URL="https://pypi.org/pypi/aspice-check/$VERSION/json"
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "aspice-check $VERSION already on PyPI — skipping"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "aspice-check $VERSION not on PyPI — will publish"
          fi

      - name: Build aspice-check
        if: steps.check.outputs.already_published == 'false'
        run: python -m build aspice-check/ --outdir aspice-check/dist

      - name: Publish aspice-check to PyPI
        id: publish
        if: steps.check.outputs.already_published == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ inputs.test_pypi && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: |
          python -m twine upload --non-interactive aspice-check/dist/*
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        if: steps.check.outputs.already_published == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: aspice-check-dist
          path: aspice-check/dist/*

  # ---------------------------------------------------------------------
  # Create a GitHub release (tag push only, not manual dispatch;
  # skipped when publishing to TestPyPI)
  # ---------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-confluence-ai
      - publish-aspice-eval
      - publish-aspice-check
    if: |
      always() &&
      needs.prepare.outputs.is_tag_push == 'true' &&
      !inputs.test_pypi
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist-artifacts/**/*.whl
            dist-artifacts/**/*.tar.gz
